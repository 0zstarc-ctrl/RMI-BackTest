services:
  - type: web
    name: rmi-backtest-api
    runtime: node
    rootDir: recovered_make/backend
    plan: free
    buildCommand: npm install && npm run db:generate && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: DATABASE_URL
        sync: false
      - key: UPBIT_API_BASE_URL
        value: https://api.upbit.com/v1
      - key: CORS_ORIGIN
        sync: false
      - key: HOST
        value: 0.0.0.0
      - key: NODE_ENV
        value: production

  - type: web
    name: rmi-backtest-web
    runtime: static
    rootDir: recovered_make
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: recovered_make/dist
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
